var CITY='lisbon';
var EV=ALL[CITY];
function d(x){return new Date(x);}
function fmt(x){return d(x).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function grp(e){var s=d(e.start);if(s<=TODAY)return"On now";var diff=(s-TODAY)/86400000;if(diff<=7)return"This week";if(s.getMonth()===TODAY.getMonth())return"Later this month";return s.toLocaleDateString('en-GB',{month:'long'});}
var order=["On now","This week","Later this month","July","August","September"];
var active='all';

function render(){
  document.getElementById('filter').querySelectorAll('.fchip').forEach(function(c){c.classList.toggle('on',c.dataset.p===active);});
  document.getElementById('fnote').textContent=active==='all'?'Showing all events — each card flags who it suits.':'Showing events that suit '+PLABEL[active].toLowerCase()+' travellers — the rest are dimmed out.';
  var vis=EV.filter(function(e){return d(e.end)>=TODAY && (active==='all'||e.fitment[active]||e.caution[active]);});
  var hidden=EV.filter(function(e){return d(e.end)<TODAY;}).length;
  var groups={};vis.forEach(function(e){(groups[grp(e)]=groups[grp(e)]||[]).push(e);});
  var html="";
  if(!vis.length)html='<div class="empty">No '+PLABEL[active].toLowerCase()+'-friendly events in this window. <a href="#" style="color:var(--blue)">See everything →</a></div>';
  order.forEach(function(g){
    if(!groups[g])return;
    html+='<div class="egroup">'+g+'</div>';
    groups[g].sort(function(a,b){return d(a.start)-d(b.start);}).forEach(function(e){
      var live=d(e.start)<=TODAY&&d(e.end)>=TODAY;
      var dates=e.start===e.end?fmt(e.start):fmt(e.start)+' – '+fmt(e.end);
      var fitKeys=Object.keys(e.fitment);
      var fitsHtml=fitKeys.map(function(p){return '<span class="fit"><b>'+p+'</b><span class="why">'+e.fitment[p]+'</span></span>';}).join('');
      var cautHtml=Object.keys(e.caution).map(function(p){return '<div class="caution"><b>⚠ '+p+':</b><span>'+e.caution[p]+'</span></div>';}).join('');
      var tagsHtml=e.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join('');
      html+='<div class="ecard'+(live?' live':'')+'"><div class="etop">'
        +'<span class="cat cat-'+e.cat+'">'+e.cat+'</span>'
        +(live?'<span class="live-b">● on now</span>':'')
        +(!e.verified?'<span class="tbc">dates to confirm</span>':'')
        +'</div>'
        +'<div class="ename">'+e.name+'</div>'
        +'<div class="edate">'+dates+' · '+e.area+'</div>'
        +'<div class="eblurb">'+e.blurb+'</div>'
        +'<div class="fitlabel">who it suits</div><div class="fits">'+fitsHtml+'</div>'
        +cautHtml
        +'<div class="tags">'+tagsHtml+'</div>'
        +'<div class="erow">'
          +(e.hood?'<a class="ehood" href="#">📍 Stay near: '+e.hood+'</a>':'')
          +'<a class="elink" href="'+e.link+'" target="_blank" rel="noopener">'+(e.ltype==="official"?"Official site ↗":"Find info ↗")+'</a>'
        +'</div></div>';
    });
  });
  document.getElementById('events').innerHTML=html;
  document.getElementById('foot').innerHTML=hidden+' past event'+(hidden===1?'':'s')+' hidden automatically · refreshed 1st &amp; 15th · free festivals link to official info, never a paid reseller · hashtags are filterable across cities';
}
['all','Solo','Family','Foodie','Culture'].forEach(function(p){
  var b=document.createElement('button');b.className='fchip';b.dataset.p=p;b.textContent=PLABEL[p];
  b.addEventListener('click',function(){active=p;render();});
  document.getElementById('filter').appendChild(b);
});
document.getElementById('citysel').addEventListener('change',function(){CITY=this.value;EV=ALL[CITY];var nm=this.options[this.selectedIndex].text;document.querySelector('.h1').innerHTML="What's on in "+nm+" <i>this season</i>";active='all';render();});
render();
</script>
